<!-- Partial: Site header with logo and navigation -->
<header class="sticky top-0 z-50 bg-white/90 backdrop-blur border-b border-gray-200">
  <nav class="flex items-center justify-between px-4 py-3" x-data="{ menuOpen: false }">
    <!-- Logo / App name -->
    <a href="/" class="flex items-center gap-2 text-lg font-bold tracking-tight text-indigo-600">
      <span class="text-2xl">🧠</span>
      <span>NORMALAIZER</span>
    </a>

    <!-- Desktop nav links -->
    <div class="hidden sm:flex items-center gap-4 text-sm font-medium">
      <a href="/login" class="text-gray-600 hover:text-indigo-600 transition">Login</a>
      <a href="/pricing" class="text-gray-600 hover:text-indigo-600 transition">Pricing</a>
      <a href="/developers" class="text-gray-600 hover:text-indigo-600 transition">Developers</a>
    </div>

    <!-- Mobile hamburger -->
    <button @click="menuOpen = !menuOpen" class="sm:hidden p-1 text-gray-600 hover:text-indigo-600" aria-label="Toggle menu">
      <svg x-show="!menuOpen" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
      <svg x-show="menuOpen" x-cloak xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>

    <!-- Mobile dropdown -->
    <div x-show="menuOpen" x-transition @click.outside="menuOpen = false"
         class="absolute top-full left-0 right-0 bg-white border-b border-gray-200 shadow-md sm:hidden">
      <div class="flex flex-col px-4 py-3 gap-3 text-sm font-medium">
        <a href="/login" @click="menuOpen = false" class="text-gray-600 hover:text-indigo-600 transition">Login</a>
        <a href="/pricing" @click="menuOpen = false" class="text-gray-600 hover:text-indigo-600 transition">Pricing</a>
        <a href="/developers" @click="menuOpen = false" class="text-gray-600 hover:text-indigo-600 transition">Developers</a>
      </div>
    </div>
  </nav>
</header>
