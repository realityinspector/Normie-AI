{# Message bubble partial — expects: msg (object with sender_name, text, created_at, is_own, is_system?, is_error?, is_html?) #}

{# System messages (joins, errors, info) #}
<template x-if="msg.is_system">
  <div class="flex justify-center">
    <div class="max-w-[85%] rounded-xl px-4 py-2 mb-1 text-center"
         :class="msg.is_error ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-gray-100 text-gray-500'">
      <template x-if="msg.is_html">
        <p class="text-xs leading-relaxed break-words" x-html="msg.text"></p>
      </template>
      <template x-if="!msg.is_html">
        <p class="text-xs leading-relaxed break-words" x-text="msg.text"></p>
      </template>
      <p class="text-[10px] mt-1 text-gray-400" x-text="msg.time"></p>
    </div>
  </div>
</template>

{# Normal user messages #}
<template x-if="!msg.is_system">
  <div class="flex" :class="msg.is_own ? 'justify-end' : 'justify-start'">
    <div class="max-w-[75%] rounded-2xl px-4 py-2 mb-1"
         :class="msg.is_own
           ? 'bg-indigo-600 text-white rounded-br-md'
           : 'bg-gray-100 text-gray-900 rounded-bl-md'">
      <!-- Sender name (others only) -->
      <template x-if="!msg.is_own">
        <p class="text-xs font-semibold mb-0.5" :class="msg.is_own ? 'text-indigo-200' : 'text-indigo-600'" x-text="msg.sender_name"></p>
      </template>
      <!-- Message text -->
      <p class="text-sm leading-relaxed break-words" x-text="msg.text"></p>
      <!-- Timestamp -->
      <p class="text-[10px] mt-1 text-right"
         :class="msg.is_own ? 'text-indigo-300' : 'text-gray-400'"
         x-text="msg.time"></p>
    </div>
  </div>
</template>
