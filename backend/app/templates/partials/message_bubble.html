{# Message bubble partial — expects: msg (object with sender_name, text, created_at, is_own, is_system?, is_error?, is_html?).
   Must have a single root element because this is included inside <template x-for="msg in messages">,
   and Alpine silently drops all but the first root child of an x-for template. #}
<div>
  {# System messages (joins, errors, info) #}
  <template x-if="msg.is_system">
    <div class="flex justify-center">
      <div class="max-w-[85%] rounded-xl px-4 py-2 mb-1 text-center"
           :class="msg.is_error ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-gray-100 text-gray-500'">
        <template x-if="msg.is_html">
          <p class="text-xs leading-relaxed break-words" x-html="msg.text"></p>
        </template>
        <template x-if="!msg.is_html">
          <p class="text-xs leading-relaxed break-words" x-text="msg.text"></p>
        </template>
        <p class="text-[10px] mt-1 text-gray-400" x-text="msg.time"></p>
      </div>
    </div>
  </template>

  {# Normal user messages #}
  <template x-if="!msg.is_system">
    <div>
      <div class="flex" :class="msg.is_own ? 'justify-end' : 'justify-start'">
        <div class="max-w-[75%] rounded-2xl px-4 py-2 mb-1"
             :class="msg.is_own
               ? 'bg-indigo-600 text-white rounded-br-md'
               : 'bg-gray-100 text-gray-900 rounded-bl-md'">
          <!-- Sender name (others only) -->
          <template x-if="!msg.is_own">
            <p class="text-xs font-semibold mb-0.5" :class="msg.is_own ? 'text-indigo-200' : 'text-indigo-600'" x-text="msg.sender_name"></p>
          </template>
          <!-- Message text -->
          <p class="text-sm leading-relaxed break-words" x-text="msg.text"></p>
          <!-- Timestamp + read indicator -->
          <p class="text-[10px] mt-1 text-right flex items-center justify-end gap-1"
             :class="msg.is_own ? 'text-indigo-300' : 'text-gray-400'">
            <span x-text="msg.time"></span>
            <template x-if="msg.is_own">
              <span class="inline-flex items-center gap-0.5"
                    :title="readerFor(msg) ? ('Read by ' + readerFor(msg)) : 'Sent'">
                <!-- Single check = sent; double check = read -->
                <svg x-show="!readerFor(msg)" class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
                <svg x-show="readerFor(msg)" class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4 6-7" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M11 13l4 4L22 7" />
                </svg>
              </span>
            </template>
          </p>
        </div>
      </div>
      <!-- Preview: how this reads in the opposite style (only when alone in a room). -->
      <template x-if="msg.is_own && msg.preview_text">
        <div class="flex justify-end">
          <div class="max-w-[75%] rounded-2xl rounded-br-md px-4 py-2 mb-2 bg-indigo-50 border border-indigo-100">
            <p class="text-[10px] font-semibold uppercase tracking-wide text-indigo-500 mb-1">
              Preview — <span x-text="msg.preview_style === 'neurotypical' ? 'reads to neurotypical' : 'reads to autistic'"></span>
            </p>
            <p class="text-sm leading-relaxed break-words text-indigo-900" x-text="msg.preview_text"></p>
          </div>
        </div>
      </template>
    </div>
  </template>
</div>
