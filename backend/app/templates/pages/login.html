{% extends "base.html" %}

{% block title %}Login – NORMALAIZER{% endblock %}

{% block head %}
<script src="/static/js/auth.js" defer></script>
{% endblock %}

{% block content %}
{% include "partials/header.html" %}

<main class="px-5 py-10" x-data="loginForm()">

  <div class="text-center mb-8">
    <h1 class="text-2xl font-extrabold text-gray-900">Welcome back</h1>
    <p class="mt-2 text-sm text-gray-500">Sign in to continue to NORMALAIZER</p>
  </div>

  <!-- Global error message -->
  <div x-show="errorMessage" x-transition
       class="mb-5 p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm"
       x-text="errorMessage"></div>

  <form @submit.prevent="submit" class="space-y-5">

    <!-- Email -->
    <div>
      <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input id="email" type="email" x-model="email" required
             class="w-full rounded-xl border border-gray-300 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
             placeholder="you@example.com" />
      <p x-show="errors.email" x-text="errors.email" class="mt-1 text-xs text-red-600"></p>
    </div>

    <!-- Password -->
    <div>
      <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input id="password" type="password" x-model="password" required
             class="w-full rounded-xl border border-gray-300 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
             placeholder="Your password" />
      <p x-show="errors.password" x-text="errors.password" class="mt-1 text-xs text-red-600"></p>
    </div>

    <!-- Submit -->
    <button type="submit" :disabled="loading"
            class="w-full flex items-center justify-center px-6 py-3 rounded-xl bg-indigo-600 text-white font-semibold text-sm shadow-md hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition">
      <svg x-show="loading" class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
      <span x-text="loading ? 'Signing in...' : 'Sign In'"></span>
    </button>
  </form>

  <!-- Divider -->
  <div class="flex items-center gap-3 my-6">
    <div class="flex-1 border-t border-gray-200"></div>
    <span class="text-xs text-gray-400 uppercase tracking-wide">or</span>
    <div class="flex-1 border-t border-gray-200"></div>
  </div>

  <!-- Google Sign-In placeholder -->
  <button disabled
          class="w-full flex items-center justify-center gap-2 px-6 py-3 rounded-xl border border-gray-300 text-gray-400 font-semibold text-sm cursor-not-allowed">
    <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    <span>Sign in with Google (coming soon)</span>
  </button>

  <!-- Link to signup -->
  <p class="mt-8 text-center text-sm text-gray-500">
    Don't have an account?
    <a href="/signup" class="font-semibold text-indigo-600 hover:text-indigo-500 transition">Create one</a>
  </p>

</main>
{% endblock %}
