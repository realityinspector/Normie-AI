<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}NORMALIZER{% endblock %}</title>

  <!-- Tailwind CSS v4 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Alpine.js v3 CDN -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>

  <!-- App CSS -->
  <link rel="stylesheet" href="/static/css/app.css?v=2" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>" />

  <!-- OG Meta Tags (defaults, override via blocks) -->
  <meta property="og:site_name" content="NORMALAIZER">
  <meta property="og:type" content="website">
  {% block og_title %}<meta property="og:title" content="NORMALAIZER – AI Communication Bridge">{% endblock %}
  {% block og_description %}<meta property="og:description" content="Real-time AI translation between neurotypical and neurodivergent communication styles.">{% endblock %}
  {% block og_image %}<meta property="og:image" content="/static/img/og-default.png">{% endblock %}
  <meta name="twitter:card" content="summary_large_image">

  {% block head %}{% endblock %}
</head>
<body class="bg-gray-100 min-h-screen flex items-start justify-center">

  <!-- Phone-frame layout: full-width on mobile, centered card on desktop -->
  <div class="w-full max-w-md mx-auto min-h-screen bg-white shadow-lg sm:shadow-xl">
    {% block content %}{% endblock %}
  </div>

</body>
</html>
