<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B"/>
      <stop offset="100%" style="stop-color:#312E81"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8"/>
      <stop offset="50%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#C4B5FD"/>
    </linearGradient>
    <linearGradient id="aiTextGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#E0E7FF"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bgGrad)"/>

  <!-- Brain icon centered -->
  <g transform="translate(262, 140) scale(3.2)">
    <!-- Head silhouette -->
    <path d="M85 20 C50 20, 20 50, 20 85 C20 110, 30 130, 50 145 L50 160 C50 165, 54 170, 60 170 L90 170 C96 170, 100 165, 100 160 L100 145 C120 130, 135 110, 135 85 C135 50, 105 20, 85 20Z"
          fill="none" stroke="url(#iconGrad)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Brain folds -->
    <path d="M55 65 C65 55, 85 55, 78 70 C72 82, 58 78, 55 65Z" fill="none" stroke="url(#iconGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M80 58 C90 50, 110 55, 105 68 C100 80, 85 78, 80 65Z" fill="none" stroke="url(#iconGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M50 85 C60 78, 78 82, 75 95 C72 105, 55 100, 50 85Z" fill="none" stroke="url(#iconGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M78 82 C88 75, 108 80, 105 95 C102 108, 82 102, 78 90Z" fill="none" stroke="url(#iconGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Center divide -->
    <path d="M78 45 L78 130" fill="none" stroke="url(#iconGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    <!-- Neural dots -->
    <circle cx="65" cy="70" r="3" fill="#C4B5FD"/>
    <circle cx="95" cy="65" r="3" fill="#A78BFA"/>
    <circle cx="60" cy="95" r="3" fill="#E0E7FF"/>
    <circle cx="98" cy="92" r="3" fill="#C4B5FD"/>
    <!-- Signal waves emanating from brain -->
    <path d="M130 55 C140 50, 145 60, 140 65" fill="none" stroke="#C4B5FD" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M140 48 C155 40, 162 58, 155 65" fill="none" stroke="#A78BFA" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <path d="M25 55 C15 50, 10 60, 15 65" fill="none" stroke="#C4B5FD" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M15 48 C0 40, -7 58, 0 65" fill="none" stroke="#A78BFA" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- "AI" text below brain -->
  <text x="512" y="850" text-anchor="middle" font-family="SF Pro Display, -apple-system, Helvetica Neue, Arial, sans-serif" font-size="180" font-weight="900" letter-spacing="8" fill="url(#aiTextGrad)">AI</text>

  <!-- Subtle glow behind AI text -->
  <ellipse cx="512" cy="810" rx="160" ry="60" fill="#818CF8" opacity="0.08"/>
</svg>
