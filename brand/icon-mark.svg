<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="markGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
  </defs>

  <!-- Brain with embedded neural network pattern -->
  <g transform="translate(22, 10) scale(1.15)">
    <!-- Head outline -->
    <path d="M85 20 C50 20, 20 50, 20 85 C20 110, 30 130, 50 145 L50 160 C50 165, 54 170, 60 170 L90 170 C96 170, 100 165, 100 160 L100 145 C120 130, 135 110, 135 85 C135 50, 105 20, 85 20Z"
          fill="none" stroke="url(#markGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Brain structure - left hemisphere -->
    <path d="M55 60 C62 50, 76 50, 76 62 C76 74, 60 74, 55 60Z" fill="none" stroke="url(#markGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M48 82 C55 72, 74 76, 72 88 C70 100, 52 96, 48 82Z" fill="none" stroke="url(#markGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M52 105 C58 98, 72 100, 70 110 C68 120, 55 118, 52 105Z" fill="none" stroke="url(#markGrad)" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Brain structure - right hemisphere -->
    <path d="M82 55 C89 45, 108 50, 108 62 C108 74, 90 72, 82 62Z" fill="none" stroke="url(#markGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M82 78 C90 70, 112 74, 110 88 C108 100, 88 96, 82 85Z" fill="none" stroke="url(#markGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M82 102 C88 95, 106 98, 104 108 C102 118, 86 116, 82 105Z" fill="none" stroke="url(#markGrad)" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Neural connection nodes -->
    <circle cx="66" cy="62" r="3.5" fill="#6366F1"/>
    <circle cx="96" cy="60" r="3.5" fill="#8B5CF6"/>
    <circle cx="60" cy="88" r="3.5" fill="#7C3AED"/>
    <circle cx="100" cy="86" r="3.5" fill="#6366F1"/>
    <circle cx="62" cy="110" r="3.5" fill="#A78BFA"/>
    <circle cx="94" cy="108" r="3.5" fill="#8B5CF6"/>

    <!-- Cross-hemisphere connections -->
    <line x1="66" y1="62" x2="96" y2="60" stroke="#A78BFA" stroke-width="1.5" opacity="0.5"/>
    <line x1="60" y1="88" x2="100" y2="86" stroke="#A78BFA" stroke-width="1.5" opacity="0.5"/>
    <line x1="62" y1="110" x2="94" y2="108" stroke="#A78BFA" stroke-width="1.5" opacity="0.5"/>
    <line x1="66" y1="62" x2="60" y2="88" stroke="#C4B5FD" stroke-width="1" opacity="0.3"/>
    <line x1="96" y1="60" x2="100" y2="86" stroke="#C4B5FD" stroke-width="1" opacity="0.3"/>
    <line x1="60" y1="88" x2="62" y2="110" stroke="#C4B5FD" stroke-width="1" opacity="0.3"/>
    <line x1="100" y1="86" x2="94" y2="108" stroke="#C4B5FD" stroke-width="1" opacity="0.3"/>

    <!-- Signal waves -->
    <path d="M132 58 C142 52, 148 62, 142 68" fill="none" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M142 50 C156 42, 164 60, 156 68" fill="none" stroke="#C4B5FD" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <path d="M23 58 C13 52, 7 62, 13 68" fill="none" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M13 50 C-1 42, -9 60, -1 68" fill="none" stroke="#C4B5FD" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  </g>
</svg>
